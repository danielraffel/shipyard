name: Sandbox E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      runner_provider:
        description: Runner provider for sandbox jobs
        required: false
        default: github-hosted
        type: choice
        options:
          - github-hosted
          - namespace
      linux_runner_selector_json:
        description: Optional JSON string/array for Linux runs-on
        required: false
        default: ""
        type: string
      macos_arm64_runner_selector_json:
        description: Optional JSON string/array for macOS ARM64 runs-on
        required: false
        default: ""
        type: string

concurrency:
  group: sandbox-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve-runners:
    name: Resolve runners
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.resolve.outputs.matrix_json }}
    steps:
      - uses: actions/checkout@v5

      - id: resolve
        env:
          REQUESTED_PROVIDER: ${{ inputs.runner_provider || vars.DEFAULT_RUNNER_PROVIDER || 'github-hosted' }}
          EXPLICIT_LINUX_RUNNER_SELECTOR_JSON: ${{ inputs.linux_runner_selector_json || '' }}
          EXPLICIT_MACOS_ARM64_RUNNER_SELECTOR_JSON: ${{ inputs.macos_arm64_runner_selector_json || '' }}
          NAMESPACE_LINUX_RUNS_ON_JSON: ${{ vars.NAMESPACE_LINUX_RUNS_ON_JSON }}
          NAMESPACE_MACOS_ARM64_RUNS_ON_JSON: ${{ vars.NAMESPACE_MACOS_ARM64_RUNS_ON_JSON }}
        run: python3 scripts/ci_matrix.py --workflow sandbox-e2e --github-output

  sandbox:
    needs: resolve-runners
    name: ${{ matrix.name }} [${{ matrix.provider }}]
    runs-on: ${{ fromJSON(matrix.runs_on_json) }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-runners.outputs.matrix_json) }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --bin shipyard

      - name: Install pytest
        run: |
          python3 -m venv .venv-sandbox
          .venv-sandbox/bin/python -m pip install pytest

      - name: Run sandbox E2E
        env:
          SHIPYARD_BINARY_FOR_TEST: ${{ github.workspace }}/target/release/shipyard
        run: .venv-sandbox/bin/python -m pytest tools/sandbox-e2e/

      - name: Upload sandbox tempdir on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: sandbox-e2e-${{ matrix.name }}-logs
          # Sandbox tempdirs come from tempfile.mkdtemp(...), which honors
          # TMPDIR/platform defaults. GitHub macOS runners use
          # /private/var/folders/... rather than /tmp, so cover both.
          path: |
            /tmp/shipyard-sandbox-e2e.*/**
            /private/var/folders/**/shipyard-sandbox-e2e.*/**
            /var/folders/**/shipyard-sandbox-e2e.*/**
          if-no-files-found: ignore
          retention-days: 7
