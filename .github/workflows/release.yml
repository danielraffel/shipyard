name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      runner_provider:
        description: "Runner provider"
        required: false
        default: "namespace"
        type: choice
        options:
          - github-hosted
          - namespace

permissions:
  contents: write

jobs:
  resolve-runners:
    runs-on: ubuntu-latest
    outputs:
      linux: ${{ steps.resolve.outputs.linux }}
      linux_arm: ${{ steps.resolve.outputs.linux_arm }}
      macos_arm: ${{ steps.resolve.outputs.macos_arm }}
      windows: ${{ steps.resolve.outputs.windows }}
    steps:
      - id: resolve
        # Per-target runner provider resolution. Priority per target:
        #   1. workflow_dispatch input `runner_provider` (all-target
        #      override for a one-off dispatch).
        #   2. Per-target repo variable — `DEFAULT_RUNNER_PROVIDER_LINUX`
        #      / `_MACOS` / `_WINDOWS`. Lets us route one platform
        #      around a provider outage. #193 motivated this —
        #      Namespace Windows was saturated 2026-04-23 while
        #      Namespace Linux + macOS were healthy.
        #   3. Global repo variable `DEFAULT_RUNNER_PROVIDER`.
        #   4. Hardcoded fallback `github-hosted` (fork-safe).
        # See RELEASING.md § "Preferred runner provider".
        env:
          INPUT_PROVIDER: ${{ inputs.runner_provider }}
          DEFAULT_ALL: ${{ vars.DEFAULT_RUNNER_PROVIDER }}
          DEFAULT_LINUX: ${{ vars.DEFAULT_RUNNER_PROVIDER_LINUX }}
          DEFAULT_MACOS: ${{ vars.DEFAULT_RUNNER_PROVIDER_MACOS }}
          DEFAULT_WINDOWS: ${{ vars.DEFAULT_RUNNER_PROVIDER_WINDOWS }}
        run: |
          resolve_provider() {
            local target_var="$1"
            if [ -n "${INPUT_PROVIDER:-}" ]; then echo "${INPUT_PROVIDER}"; return; fi
            if [ -n "${target_var:-}" ]; then echo "${target_var}"; return; fi
            if [ -n "${DEFAULT_ALL:-}" ]; then echo "${DEFAULT_ALL}"; return; fi
            echo "github-hosted"
          }

          P_LINUX=$(resolve_provider "${DEFAULT_LINUX}")
          P_MACOS=$(resolve_provider "${DEFAULT_MACOS}")
          P_WINDOWS=$(resolve_provider "${DEFAULT_WINDOWS}")
          echo "resolved providers: linux=$P_LINUX macos=$P_MACOS windows=$P_WINDOWS"

          if [ "$P_LINUX" = "namespace" ]; then
            echo "linux=\"namespace-profile-generouscorp\"" >> "$GITHUB_OUTPUT"
            echo "linux_arm=\"namespace-profile-generouscorp\"" >> "$GITHUB_OUTPUT"
          else
            echo "linux=\"ubuntu-latest\"" >> "$GITHUB_OUTPUT"
            echo "linux_arm=\"ubuntu-24.04-arm\"" >> "$GITHUB_OUTPUT"
          fi

          # macOS has only one runner shape today regardless of
          # provider (Namespace piggybacks on GitHub's macOS fleet),
          # but keep the provider plumbing in place so future macOS
          # ARM self-hosted pools can slot in without another
          # workflow edit.
          if [ "$P_MACOS" = "namespace" ]; then
            echo "macos_arm=\"namespace-profile-generouscorp-macos\"" >> "$GITHUB_OUTPUT"
          else
            echo "macos_arm=\"macos-15\"" >> "$GITHUB_OUTPUT"
          fi
          # #256: Intel Mac (x86_64) dropped. No macos_x64 output
          # anymore — it's gone from the build matrix too.

          if [ "$P_WINDOWS" = "namespace" ]; then
            echo "windows=\"namespace-profile-generouscorp-windows\"" >> "$GITHUB_OUTPUT"
          else
            echo "windows=\"windows-latest\"" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve-runners
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            artifact: shipyard-macos-arm64
            runs_on: ${{ needs.resolve-runners.outputs.macos_arm }}
          # #256: Intel Mac (x86_64) dropped as of v0.50.0. Apple
          # Silicon only. install.sh surfaces a clean
          # "unsupported platform" message when an Intel Mac runs
          # it, distinct from a 404 on a missing asset.
          - target: windows-x64
            artifact: shipyard-windows-x64
            runs_on: ${{ needs.resolve-runners.outputs.windows }}
          - target: linux-x64
            artifact: shipyard-linux-x64
            runs_on: ${{ needs.resolve-runners.outputs.linux }}
          - target: linux-arm64
            artifact: shipyard-linux-arm64
            runs_on: ${{ needs.resolve-runners.outputs.linux_arm }}
    name: Build ${{ matrix.target }}
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # 3.13 shaved ~200–400ms off cold start of the PyInstaller
          # onefile binary vs 3.12 (PEP 659 specializing adaptive
          # interpreter + lazy module loading). Tracked under #28.
          python-version: "3.13"

      - name: Install dependencies
        # `--break-system-packages` is required on Namespace macOS
        # runners (PEP 668 externally-managed Python). GitHub-hosted
        # runners accept the flag as a no-op. Without it, v0.32.0's
        # macos-arm64 build job failed on
        #   error: externally-managed-environment
        # when the workflow moved from github-hosted default to
        # Namespace default (#187). The runner is ephemeral so the
        # "system-wide install" warning the flag bypasses is
        # irrelevant.
        run: pip install --break-system-packages .[dev] pyinstaller

      # #226: macOS build is a PyInstaller health-check only — no
      # signing, no notarization in this step. The signed artifact
      # that ships is produced by a separate job `sign-and-upload-
      # macos` (gated on `CI_MACOS_SIGNING_ENABLED=true`) OR by the
      # maintainer's local `scripts/release-macos-local.sh`. The
      # earlier CI-signing machinery that used to live here (detect-
      # readiness + import-keychain + --codesign-identity) signed
      # every macOS binary only for the result to be discarded post-
      # #54, so it was dead code paying a real keychain-mutation tax
      # on every release. Retired in this cleanup. See #226 for the
      # current CI-signing experiment path, which uses ephemeral-
      # keychain import inside its own job instead.
      - name: Build binary
        # `shell: bash` so Windows uses Git-for-Windows bash instead
        # of PowerShell.
        shell: bash
        env:
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          set -euo pipefail
          pyinstaller --onefile --name "$ARTIFACT" src/shipyard/cli.py

      # Skip uploading macOS artifacts to the workflow's artifact
      # store — they're unsigned, unnotarized, and should not reach
      # the release. The local script publishes the signed macOS
      # assets directly via `gh release upload --clobber`.
      - name: Upload artifact (non-macOS)
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

      - name: macOS build health check (build-only, no asset upload)
        if: runner.os == 'macOS'
        # Explicitly surface in the CI log that the macOS build
        # succeeded but is intentionally NOT being packaged into the
        # release. Post-workflow, the maintainer runs
        # scripts/release-macos-local.sh to sign+notarize on their
        # Mac and upload the signed asset.
        #
        # #256: Intel (x86_64) support was dropped as of v0.50.0. The
        # matrix only builds arm64 now; install.sh surfaces a clean
        # "unsupported" message to anyone running it on Intel.
        run: |
          echo "✓ macOS build succeeded (${{ matrix.artifact }})."
          echo ""
          echo "This binary is NOT being uploaded to the release."
          echo "macOS signing + notarization is local-only (see #219)."
          echo "Run on your Mac after the release tag appears:"
          echo ""
          echo "  ./scripts/release-macos-local.sh \\"
          echo "    --tag ${{ github.ref_name }} --upload"
          echo ""
          echo "The script signs, notarizes, staples, uploads the"
          echo "arm64 dmg, flips the draft release to public (#252),"
          echo "and runs the end-to-end install.sh verification."
          echo ""

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f | while read f; do
            cp "$f" release/
          done
          cd release && sha256sum * > checksums.sha256

      - name: Create GitHub Release (draft until macOS dmg attached)
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          # #252: keep the release in draft until the macOS .dmg has
          # been uploaded + verified by the maintainer's local script.
          # install.sh's `releases/latest` resolution automatically
          # excludes drafts, so end users on macOS degrade to the
          # previous published release during the gap window instead
          # of hitting a 404 on the missing dmg asset.
          # release-macos-local.sh's final step flips draft=false
          # once the dmg passes the end-to-end install check.
          draft: true

  # ── #226: CI-signing experiment ───────────────────────────────────
  # Gated on repo variable `CI_MACOS_SIGNING_ENABLED == 'true'`.
  # Absent / false → this job is a no-op (conditional skips the whole
  # job, no minutes burned). When enabled, runs the full sign +
  # notarize + staple + upload pipeline on a Namespace macOS runner
  # and attaches the dmg to the draft release. Does NOT flip the
  # release public — the maintainer's local invocation remains the
  # load-bearing cross-machine verification gate per #219/CLAUDE.md.
  # The hypothesis (#226): CI-signing failed pre-v0.44 because we
  # shipped bare Mach-O that depended on Apple's flaky online
  # notarization check; stapled .dmg verifies offline so that failure
  # mode shouldn't recur. Two consecutive healthy releases confirm or
  # disprove it.
  sign-and-upload-macos:
    needs: [resolve-runners, release]
    if: startsWith(github.ref, 'refs/tags/v') && vars.CI_MACOS_SIGNING_ENABLED == 'true'
    runs-on: ${{ fromJSON(needs.resolve-runners.outputs.macos_arm) }}
    steps:
      - uses: actions/checkout@v5

      - name: Install uv + PyInstaller
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --frozen
          echo "$(pwd)/.venv/bin" >> "$GITHUB_PATH"

      - name: Import Developer ID signing identity
        env:
          SIGN_P12_B64: ${{ secrets.MACOS_SIGN_P12_BASE64 }}
          SIGN_P12_PASSWORD: ${{ secrets.MACOS_SIGN_P12_PASSWORD }}
        run: |
          # Create an ephemeral keychain that only this job can see,
          # import the cert, unlock, add key-partition ACL so codesign
          # can use it non-interactively. Kept in a unique-named
          # keychain so concurrent runs + the cleanup step don't race.
          KEYCHAIN="ci-sign-$GITHUB_RUN_ID.keychain-db"
          security create-keychain -p ci "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p ci "$KEYCHAIN"
          # 6h timeout so a long notarization step doesn't hit a lock.
          security set-keychain-settings -t 21600 -u "$KEYCHAIN"
          echo "$SIGN_P12_B64" | base64 -d > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN" \
            -P "$SIGN_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          rm -f /tmp/cert.p12
          security set-key-partition-list -S apple-tool:,apple: -s -k ci "$KEYCHAIN"
          IDENTITY_SHA=$(security find-identity -p codesigning -v "$KEYCHAIN" \
            | awk '/Developer ID Application/ {print $2; exit}')
          if [ -z "$IDENTITY_SHA" ]; then
            echo "ERROR: no Developer ID Application identity in keychain." >&2
            exit 1
          fi
          echo "IDENTITY_SHA=$IDENTITY_SHA" >> "$GITHUB_ENV"
          echo "SIGNING_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Sign + notarize + staple + upload
        env:
          SHIPYARD_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          SHIPYARD_NOTARIZE_APP_PASSWORD: ${{ secrets.MACOS_NOTARIZE_APP_PASSWORD }}
          SHIPYARD_NOTARIZE_TEAM_ID: ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
          SHIPYARD_SIGNING_IDENTITY: ${{ env.IDENTITY_SHA }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/release-macos-local.sh \
            --tag ${{ github.ref_name }} \
            --upload \
            --ci-mode

      - name: Delete ephemeral signing keychain
        if: always() && env.SIGNING_KEYCHAIN != ''
        run: |
          security delete-keychain "$SIGNING_KEYCHAIN" || true
