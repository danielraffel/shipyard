name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      runner_provider:
        description: Runner provider for release jobs
        required: false
        default: github-hosted
        type: choice
        options:
          - github-hosted
          - namespace
      linux_runner_selector_json:
        description: Optional JSON string/array for Linux x64 runs-on
        required: false
        default: ""
        type: string
      linux_arm64_runner_selector_json:
        description: Optional JSON string/array for Linux ARM64 runs-on
        required: false
        default: ""
        type: string
      macos_arm64_runner_selector_json:
        description: Optional JSON string/array for macOS ARM64 runs-on
        required: false
        default: ""
        type: string
      windows_runner_selector_json:
        description: Optional JSON string/array for Windows runs-on
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve-runners:
    name: Resolve runners
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.resolve.outputs.matrix_json }}
      macos_arm64_runs_on_json: ${{ steps.resolve.outputs.macos_arm64_runs_on_json }}
    steps:
      - uses: actions/checkout@v5

      - id: resolve
        env:
          REQUESTED_PROVIDER: ${{ inputs.runner_provider || vars.DEFAULT_RUNNER_PROVIDER || 'github-hosted' }}
          EXPLICIT_LINUX_RUNNER_SELECTOR_JSON: ${{ inputs.linux_runner_selector_json || '' }}
          EXPLICIT_LINUX_ARM64_RUNNER_SELECTOR_JSON: ${{ inputs.linux_arm64_runner_selector_json || '' }}
          # Falls back to the MACOS_ARM64_LOCAL_SELECTOR_JSON repo var so the
          # macOS leg routes to the local self-hosted runner (label `local-mac`)
          # without a workflow_dispatch input on auto release events.
          EXPLICIT_MACOS_ARM64_RUNNER_SELECTOR_JSON: ${{ inputs.macos_arm64_runner_selector_json || vars.MACOS_ARM64_LOCAL_SELECTOR_JSON || '' }}
          EXPLICIT_WINDOWS_RUNNER_SELECTOR_JSON: ${{ inputs.windows_runner_selector_json || '' }}
          NAMESPACE_LINUX_RUNS_ON_JSON: ${{ vars.NAMESPACE_LINUX_RUNS_ON_JSON }}
          NAMESPACE_LINUX_ARM64_RUNS_ON_JSON: ${{ vars.NAMESPACE_LINUX_ARM64_RUNS_ON_JSON }}
          NAMESPACE_MACOS_ARM64_RUNS_ON_JSON: ${{ vars.NAMESPACE_MACOS_ARM64_RUNS_ON_JSON }}
          NAMESPACE_WINDOWS_RUNS_ON_JSON: ${{ vars.NAMESPACE_WINDOWS_RUNS_ON_JSON }}
        run: python3 scripts/ci_matrix.py --workflow release --github-output

  build:
    needs: resolve-runners
    name: Build ${{ matrix.package_target }} [${{ matrix.provider }}]
    runs-on: ${{ fromJSON(matrix.runs_on_json) }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-runners.outputs.matrix_json) }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate release runner architecture
        shell: bash
        run: |
          set -euo pipefail
          machine="$(uname -m | tr '[:upper:]' '[:lower:]')"
          case "${{ matrix.package_target }}" in
            linux-arm64|macos-arm64)
              echo "$machine" | grep -Eq '^(aarch64|arm64)$'
              ;;
            linux-x64|windows-x64)
              echo "$machine" | grep -Eq '^(x86_64|amd64)$'
              ;;
            *)
              echo "unknown package target: ${{ matrix.package_target }}" >&2
              exit 2
              ;;
          esac

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --bin shipyard

      - name: Package non-macOS artifact
        if: matrix.package_target != 'macos-arm64'
        shell: bash
        run: |
          set -euo pipefail
          ${{ matrix.python }} scripts/package_release.py \
            --skip-build \
            --binary "${{ matrix.binary }}" \
            --target "${{ matrix.package_target }}" \
            --tag "${{ github.ref_name }}" \
            --dist-dir artifacts/release

      - name: Upload non-macOS artifact
        if: matrix.package_target != 'macos-arm64'
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.package_target }}
          path: artifacts/release/${{ github.ref_name }}/*
          if-no-files-found: error

      - name: macOS build health check only
        if: matrix.package_target == 'macos-arm64'
        shell: bash
        run: |
          set -euo pipefail
          target/release/shipyard --version
          echo "macOS release artifacts are intentionally not uploaded from this unsigned build."
          echo "Run scripts/release-macos-local.sh --tag ${{ github.ref_name }} --upload to sign, notarize, upload, verify, and publish."

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - name: Download non-macOS artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f ! -name checksums.sha256 -print0 | while IFS= read -r -d '' file; do
            cp "$file" release/
          done
          test "$(find release -type f | wc -l | tr -d ' ')" -gt 0
          cd release
          sha256sum -- * > checksums.sha256

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: true

  sign-and-upload-macos:
    needs: [resolve-runners, release]
    if: startsWith(github.ref, 'refs/tags/v') && vars.CI_MACOS_SIGNING_ENABLED == 'true'
    runs-on: ${{ fromJSON(needs.resolve-runners.outputs.macos_arm64_runs_on_json) }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Import Developer ID signing identity
        env:
          SIGN_P12_B64: ${{ secrets.MACOS_SIGN_P12_BASE64 }}
          SIGN_P12_PASSWORD: ${{ secrets.MACOS_SIGN_P12_PASSWORD }}
          SIGN_TEAM_ID: ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
          NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          NOTARIZE_APP_PASSWORD: ${{ secrets.MACOS_NOTARIZE_APP_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [ -n "${SIGN_P12_B64:-}" ] || missing+=("MACOS_SIGN_P12_BASE64")
          [ -n "${SIGN_P12_PASSWORD:-}" ] || missing+=("MACOS_SIGN_P12_PASSWORD")
          [ -n "${SIGN_TEAM_ID:-}" ] || missing+=("MACOS_NOTARIZE_TEAM_ID")
          [ -n "${NOTARIZE_APPLE_ID:-}" ] || missing+=("MACOS_NOTARIZE_APPLE_ID")
          [ -n "${NOTARIZE_APP_PASSWORD:-}" ] || missing+=("MACOS_NOTARIZE_APP_PASSWORD")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'required secret missing when CI_MACOS_SIGNING_ENABLED=true: %s\n' "${missing[@]}" >&2
            exit 2
          fi
          KEYCHAIN="shipyard-ci-sign-${GITHUB_RUN_ID}.keychain-db"
          security create-keychain -p ci "$KEYCHAIN"
          existing_keychains=()
          while IFS= read -r keychain; do
            existing_keychains+=("${keychain//\"/}")
          done < <(security list-keychains -d user)
          security list-keychains -d user -s "$KEYCHAIN" "${existing_keychains[@]}"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p ci "$KEYCHAIN"
          security set-keychain-settings -t 21600 -u "$KEYCHAIN"
          echo "$SIGN_P12_B64" | base64 -d > /tmp/shipyard-cert.p12
          security import /tmp/shipyard-cert.p12 -k "$KEYCHAIN" \
            -P "$SIGN_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          rm -f /tmp/shipyard-cert.p12
          security set-key-partition-list -S apple-tool:,apple: -s -k ci "$KEYCHAIN"
          IDENTITY_SHA="$(security find-identity -p codesigning -v "$KEYCHAIN" \
            | awk -v team="(${SIGN_TEAM_ID})" '/Developer ID Application/ && index($0, team) {print $2; exit}')"
          if [ -z "$IDENTITY_SHA" ]; then
            echo "no Developer ID Application identity for Team ID ${SIGN_TEAM_ID} found in CI keychain" >&2
            exit 2
          fi
          echo "SHIPYARD_SIGNING_IDENTITY=$IDENTITY_SHA" >> "$GITHUB_ENV"
          echo "SHIPYARD_SIGNING_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Sign, notarize, staple, and upload macOS DMG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHIPYARD_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          SHIPYARD_NOTARIZE_APP_PASSWORD: ${{ secrets.MACOS_NOTARIZE_APP_PASSWORD }}
          SHIPYARD_NOTARIZE_TEAM_ID: ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail
          scripts/release-macos-local.sh \
            --repo "${{ github.repository }}" \
            --tag "${{ github.ref_name }}" \
            --upload \
            --ci-mode

      - name: Delete ephemeral signing keychain
        if: always() && env.SHIPYARD_SIGNING_KEYCHAIN != ''
        shell: bash
        run: security delete-keychain "$SHIPYARD_SIGNING_KEYCHAIN" || true
