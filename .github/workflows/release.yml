name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      runner_provider:
        description: "Runner provider"
        required: false
        default: "namespace"
        type: choice
        options:
          - github-hosted
          - namespace

permissions:
  contents: write

jobs:
  resolve-runners:
    runs-on: ubuntu-latest
    outputs:
      linux: ${{ steps.resolve.outputs.linux }}
      linux_arm: ${{ steps.resolve.outputs.linux_arm }}
      macos_arm: ${{ steps.resolve.outputs.macos_arm }}
      macos_x64: ${{ steps.resolve.outputs.macos_x64 }}
      windows: ${{ steps.resolve.outputs.windows }}
    steps:
      - id: resolve
        run: |
          PROVIDER="${{ inputs.runner_provider || 'github-hosted' }}"
          if [ "$PROVIDER" = "namespace" ]; then
            echo "linux=\"namespace-profile-generouscorp\"" >> "$GITHUB_OUTPUT"
            echo "linux_arm=\"namespace-profile-generouscorp\"" >> "$GITHUB_OUTPUT"
            echo "macos_arm=\"namespace-profile-generouscorp-macos\"" >> "$GITHUB_OUTPUT"
            echo "macos_x64=\"macos-15\"" >> "$GITHUB_OUTPUT"
            echo "windows=\"namespace-profile-generouscorp-windows\"" >> "$GITHUB_OUTPUT"
          else
            echo "linux=\"ubuntu-latest\"" >> "$GITHUB_OUTPUT"
            echo "linux_arm=\"ubuntu-24.04-arm\"" >> "$GITHUB_OUTPUT"
            echo "macos_arm=\"macos-15\"" >> "$GITHUB_OUTPUT"
            echo "macos_x64=\"macos-15\"" >> "$GITHUB_OUTPUT"
            echo "windows=\"windows-latest\"" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve-runners
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            artifact: shipyard-macos-arm64
            runs_on: ${{ needs.resolve-runners.outputs.macos_arm }}
          - target: macos-x64
            artifact: shipyard-macos-x64
            runs_on: ${{ needs.resolve-runners.outputs.macos_x64 }}
          - target: windows-x64
            artifact: shipyard-windows-x64
            runs_on: ${{ needs.resolve-runners.outputs.windows }}
          - target: linux-x64
            artifact: shipyard-linux-x64
            runs_on: ${{ needs.resolve-runners.outputs.linux }}
          - target: linux-arm64
            artifact: shipyard-linux-arm64
            runs_on: ${{ needs.resolve-runners.outputs.linux_arm }}
    name: Build ${{ matrix.target }}
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install .[dev] pyinstaller

      - name: Build binary
        run: pyinstaller --onefile --name ${{ matrix.artifact }} src/shipyard/cli.py

      # macOS 26.3+ enforces code-signing strictly; ad-hoc-signed
      # binaries with `com.apple.provenance`/`quarantine` xattrs (which
      # every GitHub-downloaded file carries) SIGKILL with "Taskgated
      # Invalid Signature". Sign with Developer ID + notarize so the
      # binary runs cleanly on a fresh install without the `install.sh`
      # xattr-strip dance having to be the only backstop.
      #
      # No Info.plist → we can't `stapler staple` a bare Mach-O, so
      # Gatekeeper verifies notarization online at first launch. That
      # requires network, which every CI user has. Accepted tradeoff
      # vs wrapping the CLI in a .app bundle we don't otherwise need.
      #
      # Skipped when the signing secrets aren't present (forks, PRs
      # from outside contributors) — the install.sh fallback still
      # handles those.
      - name: Sign + notarize macOS binary
        if: startsWith(matrix.target, 'macos-') && env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          SIGNING_CERT_P12_BASE64: ${{ secrets.SIGNING_CERT_P12_BASE64 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          BINARY="dist/${{ matrix.artifact }}"

          # Import the Developer ID certificate into a temporary keychain
          # so the job is self-contained and cleans up automatically.
          KEYCHAIN="$RUNNER_TEMP/shipyard-sign.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"

          echo "$SIGNING_CERT_P12_BASE64" | base64 -d > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$SIGNING_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed -e 's/"//g')
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # Sign with hardened-runtime + secure timestamp.
          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application: Daniel Raffel (${TEAM_ID})" \
            "$BINARY"
          codesign -dv --verbose=4 "$BINARY"

          # Notarize. --wait blocks up to 30min; in practice the bare
          # Mach-O notarizes in <60s. submit needs a zip or dmg, so
          # wrap first.
          NOTARIZE_ZIP="$RUNNER_TEMP/${{ matrix.artifact }}.zip"
          /usr/bin/ditto -c -k --keepParent "$BINARY" "$NOTARIZE_ZIP"
          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --wait

          # Can't staple a bare Mach-O. Gatekeeper checks online at
          # first launch instead (requires network). No additional
          # action needed here; the notarization ticket is registered
          # with Apple server-side and matches the binary's hash.

          # Cleanup: delete the temp keychain.
          security delete-keychain "$KEYCHAIN"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f | while read f; do
            cp "$f" release/
          done
          cd release && sha256sum * > checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
