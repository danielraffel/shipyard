name: Auto-Release on CLI Version Bump

# On every push to main, diff Cargo.toml's package.version against the
# previous push range. If it moved, create the matching v<x.y.z> tag;
# release.yml then builds draft release assets from the tag.
#
# The workflow also supports workflow_dispatch so `shipyard doctor
# --release-chain` can verify that actions/checkout accepts
# RELEASE_BOT_TOKEN. A manual dispatch with no version movement is a
# no-op after checkout.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    name: Tag CLI version bumps

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Skip on trailer or revert
        id: guard
        shell: bash
        run: |
          subject=$(git log -1 --format=%s HEAD)
          body=$(git log -1 --format=%B HEAD)
          if echo "$body" | git interpret-trailers --parse | grep -iq '^release: skip'; then
              echo "skip=1" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [[ "$subject" =~ ^[Rr]evert ]]; then
              echo "skip=1" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if echo "$body" | git interpret-trailers --parse | grep -iq '^revert-of:'; then
              echo "skip=1" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "skip=0" >> "$GITHUB_OUTPUT"

      - name: Read Cargo package version at before/after
        id: versions
        if: steps.guard.outputs.skip == '0'
        shell: bash
        run: |
          set -euo pipefail
          before='${{ github.event.before }}'
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              before="HEAD~1"
          fi

          extract_cargo_version() {
              local ref="$1"
              git show "${ref}:Cargo.toml" 2>/dev/null \
                | python3 -c 'import re, sys; text = sys.stdin.read(); m = re.search(r"(?ms)^\[package\].*?^\s*version\s*=\s*\"([^\"]+)\"", text); print(m.group(1) if m else "")'
          }

          v_before=$(extract_cargo_version "$before" || true)
          v_after=$(extract_cargo_version HEAD || true)

          echo "before=$v_before" >> "$GITHUB_OUTPUT"
          echo "after=$v_after" >> "$GITHUB_OUTPUT"
          echo "Cargo package version: $v_before -> $v_after"

      - name: Create tag if Rust CLI version moved
        if: steps.guard.outputs.skip == '0'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          V_BEFORE: ${{ steps.versions.outputs.before }}
          V_AFTER: ${{ steps.versions.outputs.after }}
        run: |
          set -euo pipefail

          if [ -z "$V_AFTER" ] || [ "$V_BEFORE" = "$V_AFTER" ]; then
              echo "Rust CLI version unchanged - no tagging."
              exit 0
          fi

          tag="v${V_AFTER}"

          git config user.name "shipyard-release-bot"
          git config user.email "shipyard-release-bot@users.noreply.github.com"

          if git ls-remote --tags origin "$tag" | grep -q .; then
              remote_target=$(git ls-remote --tags origin "${tag}^{}" | awk '{print $1}')
              if [ -z "$remote_target" ]; then
                  remote_target=$(git ls-remote --tags origin "$tag" | awk '{print $1}')
              fi
              local_sha=$(git rev-parse HEAD)
              if [ "$remote_target" = "$local_sha" ]; then
                  echo "tag $tag already at $local_sha - no-op"
                  exit 0
              fi
              echo "ERROR: tag $tag exists at $remote_target but HEAD is $local_sha" >&2
              echo "Manual reconciliation required." >&2
              exit 1
          fi

          git tag -a "$tag" -m "Release $tag (automated by auto-release.yml)"
          git push origin "$tag"
          echo "created $tag"
