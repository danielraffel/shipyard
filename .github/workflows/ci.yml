name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      runner_provider:
        description: "Runner provider"
        required: false
        default: "namespace"
        type: choice
        options:
          - github-hosted
          - namespace

jobs:
  resolve-runners:
    runs-on: ubuntu-latest
    outputs:
      linux: ${{ steps.resolve.outputs.linux }}
      macos: ${{ steps.resolve.outputs.macos }}
      windows: ${{ steps.resolve.outputs.windows }}
    steps:
      - id: resolve
        run: |
          PROVIDER="${{ inputs.runner_provider || 'github-hosted' }}"
          if [ "$PROVIDER" = "namespace" ]; then
            echo "linux=\"namespace-profile-generouscorp\"" >> "$GITHUB_OUTPUT"
            echo "macos=\"macos-15\"" >> "$GITHUB_OUTPUT"
            echo "windows=\"namespace-profile-generouscorp-windows\"" >> "$GITHUB_OUTPUT"
          else
            echo "linux=\"ubuntu-latest\"" >> "$GITHUB_OUTPUT"
            echo "macos=\"macos-15\"" >> "$GITHUB_OUTPUT"
            echo "windows=\"windows-latest\"" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: resolve-runners
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: linux
            name: Linux (x64)
            runs_on: ${{ needs.resolve-runners.outputs.linux }}
          - key: macos
            name: macOS (ARM64)
            runs_on: ${{ needs.resolve-runners.outputs.macos }}
          - key: windows
            name: Windows (x64)
            runs_on: ${{ needs.resolve-runners.outputs.windows }}
    name: ${{ matrix.name }}
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install .[dev]

      - name: Run tests
        run: pytest

      - name: Lint
        run: ruff check src/

      - name: Type check
        if: runner.os != 'Windows'
        run: mypy src/

  binary-smoke:
    # 0.22.5 — PR-gating smoke test against the actual PyInstaller
    # --onefile artifact. Unit tests run against the dev install and
    # don't catch bundling bugs like:
    #   * LookupError: unknown encoding: idna   (0.22.3)
    #   * read_daemon_status hello-race         (0.22.4)
    # Both shipped to users before this job existed. Builds the
    # binary, runs daemon start/status/stop against it, fails if the
    # daemon can't stand up or status can't reach it over IPC.
    name: Binary smoke (daemon start/status/stop)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deps + pyinstaller
        run: pip install .[dev] pyinstaller
      - name: Build --onefile binary
        run: pyinstaller --onefile --name shipyard src/shipyard/cli.py
      - name: --version sanity
        run: ./dist/shipyard --version
      - name: daemon start
        # Throwaway repo name; we're not testing webhook registration
        # here, just that the daemon binds its socket and stays up.
        run: ./dist/shipyard daemon start --repo owner/repo
      - name: settle
        run: sleep 3
      - name: daemon status — must report running
        run: |
          ./dist/shipyard daemon status
          ./dist/shipyard daemon status | grep -q "daemon running" || {
            echo "::error::daemon status did not report running. Tail of daemon.log:"
            if [ "$RUNNER_OS" = "macOS" ]; then
              tail -50 "$HOME/Library/Application Support/shipyard/daemon/daemon.log" || true
            else
              tail -50 "${XDG_STATE_HOME:-$HOME/.local/state}/shipyard/daemon/daemon.log" || true
            fi
            exit 1
          }
      - name: daemon stop
        if: always()
        run: ./dist/shipyard daemon stop || true

  state-machine:
    # #101 Phase C — dedicated lane so ship-state-machine failures are
    # visually distinct from the full-suite run. Fast (ubuntu-only, no
    # cross-platform matrix) because these tests are pure Python and
    # don't exercise platform-specific code paths.
    name: Ship state machine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install .[dev]

      - name: Run state-machine tests
        run: pytest -m state_machine -v
