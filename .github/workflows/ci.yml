name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      runner_provider:
        description: Runner provider for CI jobs
        required: false
        default: namespace
        type: choice
        options:
          - namespace
          - github-hosted
      linux_runner_selector_json:
        description: Optional JSON string/array for Linux runs-on
        required: false
        default: ""
        type: string
      macos_arm64_runner_selector_json:
        description: Optional JSON string/array for macOS ARM64 runs-on
        required: false
        default: ""
        type: string
      windows_runner_selector_json:
        description: Optional JSON string/array for Windows runs-on
        required: false
        default: ""
        type: string

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve-runners:
    name: Resolve runners
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.resolve.outputs.matrix_json }}
      linux_runs_on_json: ${{ steps.resolve.outputs.linux_runs_on_json }}
      linux_provider: ${{ steps.resolve.outputs.linux_provider }}
    steps:
      - uses: actions/checkout@v5

      - id: resolve
        env:
          REQUESTED_PROVIDER: ${{ inputs.runner_provider || vars.DEFAULT_RUNNER_PROVIDER || 'namespace' }}
          EXPLICIT_LINUX_RUNNER_SELECTOR_JSON: ${{ inputs.linux_runner_selector_json || '' }}
          EXPLICIT_MACOS_ARM64_RUNNER_SELECTOR_JSON: ${{ inputs.macos_arm64_runner_selector_json || '' }}
          EXPLICIT_WINDOWS_RUNNER_SELECTOR_JSON: ${{ inputs.windows_runner_selector_json || '' }}
          NAMESPACE_LINUX_RUNS_ON_JSON: ${{ vars.NAMESPACE_LINUX_RUNS_ON_JSON }}
          NAMESPACE_MACOS_ARM64_RUNS_ON_JSON: ${{ vars.NAMESPACE_MACOS_ARM64_RUNS_ON_JSON }}
          NAMESPACE_WINDOWS_RUNS_ON_JSON: ${{ vars.NAMESPACE_WINDOWS_RUNS_ON_JSON }}
        run: python3 scripts/ci_matrix.py --workflow ci --github-output

  test:
    needs: resolve-runners
    name: ${{ matrix.name }} [${{ matrix.provider }}]
    runs-on: ${{ fromJSON(matrix.runs_on_json) }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-runners.outputs.matrix_json) }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test --all-targets --locked

      - name: Run clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  coverage:
    needs: resolve-runners
    name: Coverage >= 75% [${{ needs.resolve-runners.outputs.linux_provider }}]
    runs-on: ${{ fromJSON(needs.resolve-runners.outputs.linux_runs_on_json) }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run coverage gate
        run: cargo llvm-cov --locked --summary-only --fail-under-lines 75

  packaging-helper:
    needs: resolve-runners
    name: Python helper tests [${{ needs.resolve-runners.outputs.linux_provider }}]
    runs-on: ${{ fromJSON(needs.resolve-runners.outputs.linux_runs_on_json) }}
    steps:
      - uses: actions/checkout@v5

      - name: Run packaging helper tests
        run: python3 -m unittest discover -s scripts -p 'test_*.py'
