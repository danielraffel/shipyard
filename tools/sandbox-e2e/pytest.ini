[pytest]
markers =
    smoke: binary launch, help, version, and unknown-command smoke checks
    surface: command-surface help checks
    state: state/config isolation checks
    daemon: daemon read-only checks
    bulkhead: destructive command exclusion checks
    installer: dev-safe install.sh dry-run and skip-download checks
    pin: consumer pin bump and PR boundary checks
    parity: JSON contract checks
    cross_binary: safe Python Shipyard vs Shipyard contract checks
